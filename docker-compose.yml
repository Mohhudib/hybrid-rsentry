version: "3.9"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rsentry_postgres
    restart: unless-stopped
    networks:
      rsentry_net:
        ipv4_address: 192.168.100.20
    environment:
      POSTGRES_USER: rsentry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: rsentry_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsentry -d rsentry_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rsentry_redis
    restart: unless-stopped
    networks:
      rsentry_net:
        ipv4_address: 192.168.100.30
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # FastAPI Backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rsentry_backend
    restart: unless-stopped
    networks:
      rsentry_net:
        ipv4_address: 192.168.100.10
    environment:
      DATABASE_URL: postgresql+asyncpg://rsentry:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/rsentry_db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:80"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./agent:/app/agent
      - evidence_store:/tmp/rsentry_evidence

  # -------------------------------------------------------------------------
  # Celery Worker
  # -------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rsentry_celery
    restart: unless-stopped
    networks:
      - rsentry_net
    command: celery -A backend.workers.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://rsentry:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/rsentry_db
      REDIS_URL: redis://redis:6379/0
      AI_API_KEY: ${AI_API_KEY:-${NVIDIA_API_KEY:-}}
      AI_API_KEY_ALERTS: ${AI_API_KEY_ALERTS:-${NVIDIA_API_KEY_ALERTS:-}}
      AI_API_KEY_CEREBRAS: ${AI_API_KEY_CEREBRAS:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_API_KEY_ALERTS: ${NVIDIA_API_KEY_ALERTS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend


volumes:
  postgres_data:
  evidence_store:

networks:
  rsentry_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
