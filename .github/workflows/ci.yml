name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # ── Unit tests + coverage ────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        # Coverage tracks only the modules that have unit tests.
        # monitor.py and monitor_ebpf.py are excluded — they need
        # integration tests (tests/integration/) which are not yet written.
        run: >
          pytest tests/unit -v --tb=short
          --cov=agent.entropy
          --cov=agent.lineage
          --cov=agent.adaptive
          --cov-report=term-missing
          --cov-fail-under=75
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  # ── eBPF DetectionEngine selftest (no kernel, no BCC required) ──────────────
  ebpf-selftest:
    name: eBPF selftest (DetectionEngine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install agent dependencies
        run: pip install psutil networkx scipy numpy

      - name: Run eBPF DetectionEngine selftest
        run: python3 -m agent.monitor_ebpf --selftest
        env:
          PYTHONPATH: .

  # ── Frontend build (catches compile/type errors) ─────────────────────────────
  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
