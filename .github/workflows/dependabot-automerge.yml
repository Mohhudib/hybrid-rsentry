name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge safe Dependabot bumps
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Safe patches: always auto-merge ─────────────────────────────────────
      # ── Safe named minors: celery, pydantic-settings, starlette, aiohttp,
      #    lucide-react, python-multipart, coverage, @vitejs/plugin-react 4→5
      # ── NEVER auto-merge: Vite 8, Tailwind 4, react-router-dom 7, openai 2
      - name: Approve and enable auto-merge
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          (
            steps.meta.outputs.update-type == 'version-update:semver-minor' &&
            (
              contains(steps.meta.outputs.dependency-names, 'celery') ||
              contains(steps.meta.outputs.dependency-names, 'pydantic-settings') ||
              contains(steps.meta.outputs.dependency-names, 'aiohttp') ||
              contains(steps.meta.outputs.dependency-names, 'starlette') ||
              contains(steps.meta.outputs.dependency-names, 'lucide-react') ||
              contains(steps.meta.outputs.dependency-names, 'python-multipart')
            )
          )
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
